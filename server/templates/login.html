<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LockIn — Focus Training</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/animations.css">
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --success: #95E77D;
            --dark: #2C3E50;
            --light: #F7F3FF;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 107, 107, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(78, 205, 196, 0.15) 0%, transparent 50%);
            animation: float 15s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        .login-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
            max-width: 1000px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        .mascot-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: slideInLeft 0.8s ease-out;
        }

        .mascot {
            width: 220px;
            height: 220px;
            margin-bottom: 2rem;
            animation: bounce 3s ease-in-out infinite;
        }

        .mascot svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.2));
        }

        .mascot-text {
            text-align: center;
            color: var(--white);
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .mascot-text h2 {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .mascot-text p {
            font-size: 1.1rem;
            opacity: 0.95;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .login-card {
            background: var(--white);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideInRight 0.8s ease-out;
        }

        .login-card h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 2rem;
            color: var(--dark);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .login-card p {
            color: #888;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .error {
            background: #FFE5E5;
            color: var(--primary);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--primary);
            font-weight: 500;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.7rem;
            color: var(--dark);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            background: #FAFAFA;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--secondary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(78, 205, 196, 0.1);
            transform: translateY(-2px);
        }

        .form-group input::placeholder {
            color: #BBB;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, #FF8E8E 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            font-family: 'Fredoka', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(255, 107, 107, 0.4);
        }

        .submit-btn:active {
            transform: translateY(-2px);
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @media (max-width: 768px) {
            .login-wrapper {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .mascot {
                width: 160px;
                height: 160px;
            }

            .mascot-text h2 {
                font-size: 1.8rem;
            }

            .login-card {
                padding: 2rem;
            }

            .login-card h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="mascot-section">
            <div class="mascot">
                <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Body -->
                    <circle cx="100" cy="120" r="50" fill="#FFD93D"/>
                    <circle cx="100" cy="80" r="45" fill="#FFD93D"/>

                    <!-- Eyes -->
                    <circle cx="85" cy="70" r="7" fill="#2C3E50"/>
                    <circle cx="115" cy="70" r="7" fill="#2C3E50"/>
                    <circle cx="86" cy="68" r="2.5" fill="white"/>
                    <circle cx="116" cy="68" r="2.5" fill="white"/>

                    <!-- Mouth -->
                    <path d="M 90 85 Q 100 92 110 85" stroke="#2C3E50" stroke-width="2.5" stroke-linecap="round" fill="none"/>

                    <!-- Arms -->
                    <rect x="50" y="110" width="15" height="50" rx="7" fill="#FFD93D" transform="rotate(-30 57 110)"/>
                    <rect x="135" y="110" width="15" height="50" rx="7" fill="#FFD93D" transform="rotate(30 142 110)"/>

                    <!-- Legs -->
                    <rect x="85" y="165" width="12" height="35" rx="6" fill="#2C3E50"/>
                    <rect x="103" y="165" width="12" height="35" rx="6" fill="#2C3E50"/>

                    <!-- Shine -->
                    <ellipse cx="85" cy="60" rx="8" ry="12" fill="white" opacity="0.4"/>
                </svg>
            </div>
            <div class="mascot-text">
                <h2>LockIn</h2>
                <p>Master your focus, befriend your pet</p>
            </div>
        </div>

        <div class="login-card">
            <h1>Ready to Study?</h1>
            <p>Sign in to train your focus and grow your digital companion</p>

            {% with messages = get_flashed_messages(category_filter=['error']) %}
                {% if messages %}
                    <div class="error">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="submit-btn">Sign In & Begin</button>
            </form>
        </div>
    </div>
</body>
</html>
